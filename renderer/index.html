<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>刘海待办</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="collapsed">
      <div id="notch" class="notch">
        <div class="notch-dot"></div>
      </div>

      <div id="card" class="card">
        <header class="card-header">
          <h1>待办</h1>
          <span class="card-subtitle">按优先级整理你的事项</span>
        </header>
        <div class="sections">
          <section class="section" data-priority="P0">
            <div class="section-header">
              <span class="badge badge-p0">P0</span>
              <span class="section-title">紧急且重要</span>
            </div>
            <ul class="todo-list" data-priority="P0"></ul>
            <div class="add-row">
              <input
                type="text"
                placeholder="添加 P0 待办..."
                data-priority="P0"
                maxlength="100"
              />
            </div>
          </section>

          <section class="section" data-priority="P1">
            <div class="section-header">
              <span class="badge badge-p1">P1</span>
              <span class="section-title">重要不紧急</span>
            </div>
            <ul class="todo-list" data-priority="P1"></ul>
            <div class="add-row">
              <input
                type="text"
                placeholder="添加 P1 待办..."
                data-priority="P1"
                maxlength="100"
              />
            </div>
          </section>

          <section class="section" data-priority="P2">
            <div class="section-header">
              <span class="badge badge-p2">P2</span>
              <span class="section-title">紧急不重要</span>
            </div>
            <ul class="todo-list" data-priority="P2"></ul>
            <div class="add-row">
              <input
                type="text"
                placeholder="添加 P2 待办..."
                data-priority="P2"
                maxlength="100"
              />
            </div>
          </section>

          <section class="section" data-priority="P3">
            <div class="section-header">
              <span class="badge badge-p3">P3</span>
              <span class="section-title">不紧急不重要</span>
            </div>
            <ul class="todo-list" data-priority="P3"></ul>
            <div class="add-row">
              <input
                type="text"
                placeholder="添加 P3 待办..."
                data-priority="P3"
                maxlength="100"
              />
            </div>
          </section>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
