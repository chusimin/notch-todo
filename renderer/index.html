<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>刘海待办</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="collapsed">
      <div id="notch" class="notch">
        <div class="notch-dot"></div>
      </div>

      <div id="card" class="card">
        <header class="card-header">
          <h1>优先级待办</h1>
          <span class="card-subtitle">Eisenhower Matrix · 四象限</span>
        </header>
        <div class="sections">
          <section class="quadrant" data-priority="P0">
            <div class="quadrant-header">
              <span class="dot dot-p0"></span>
              <span class="quadrant-label">P0</span>
              <span class="quadrant-title">紧急 · 重要</span>
              <span class="count" data-priority="P0">0</span>
            </div>
            <ul class="todo-list" data-priority="P0"></ul>
            <div class="add-row">
              <input
                type="text"
                placeholder="添加..."
                data-priority="P0"
                maxlength="80"
              />
            </div>
          </section>

          <section class="quadrant" data-priority="P1">
            <div class="quadrant-header">
              <span class="dot dot-p1"></span>
              <span class="quadrant-label">P1</span>
              <span class="quadrant-title">重要 · 不紧急</span>
              <span class="count" data-priority="P1">0</span>
            </div>
            <ul class="todo-list" data-priority="P1"></ul>
            <div class="add-row">
              <input
                type="text"
                placeholder="添加..."
                data-priority="P1"
                maxlength="80"
              />
            </div>
          </section>

          <section class="quadrant" data-priority="P2">
            <div class="quadrant-header">
              <span class="dot dot-p2"></span>
              <span class="quadrant-label">P2</span>
              <span class="quadrant-title">紧急 · 不重要</span>
              <span class="count" data-priority="P2">0</span>
            </div>
            <ul class="todo-list" data-priority="P2"></ul>
            <div class="add-row">
              <input
                type="text"
                placeholder="添加..."
                data-priority="P2"
                maxlength="80"
              />
            </div>
          </section>

          <section class="quadrant" data-priority="P3">
            <div class="quadrant-header">
              <span class="dot dot-p3"></span>
              <span class="quadrant-label">P3</span>
              <span class="quadrant-title">日常 · 待办</span>
              <span class="count" data-priority="P3">0</span>
            </div>
            <ul class="todo-list" data-priority="P3"></ul>
            <div class="add-row">
              <input
                type="text"
                placeholder="添加..."
                data-priority="P3"
                maxlength="80"
              />
            </div>
          </section>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
